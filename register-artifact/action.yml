name: 'Register Artifact'
description: 'Register a built artifact in a backend service via HTTP POST'

inputs:
  backend-url:
    required: true
    description: 'Base URL of the backend, e.g. https://example.com'
  token:
    required: true
    description: 'Bearer token for authorization'
  endpoint:
    required: false
    default: '/api/admin/artifacts/register'
    description: 'API endpoint path'
  manifest:
    required: false
    default: ''
    description: 'Path to artifact-set manifest JSON. When set, legacy artifact inputs are ignored.'
  artifact-type:
    required: false
    description: 'Artifact type string passed to the backend'
  version:
    required: false
    description: 'Artifact version string'
  s3-key:
    required: false
    description: 'S3 object key where the artifact was uploaded'
  sha256:
    required: false
    description: 'SHA-256 hex digest of the artifact file'
  size-bytes:
    required: false
    description: 'File size in bytes'
  channel:
    required: false
    default: ''
    description: 'Release channel, e.g. stable, beta'
  license-type:
    required: false
    default: ''
    description: 'Optional license type label'
  native-key:
    required: false
    default: ''
    description: 'Optional native key'
  run-url:
    required: false
    default: ''
    description: 'URL to the CI run that produced this artifact'

runs:
  using: 'node20'
  main: 'dist/index.js'
